# Render Blueprint — Node web service (static files + Telegram API proxy).
services:
  - type: web
    name: alen-studio
    runtime: node
    buildCommand: npm ci && npm run build
    startCommand: node server.js
    pullRequestPreviewsEnabled: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
